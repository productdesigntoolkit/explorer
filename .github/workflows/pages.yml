name: Rebuild data.js

on:
  push:
    branches: [main]
    paths:
      - '*/**.md'
      - 'build.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate data.js
        run: python3 build.py

      - name: Commit data.js if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet || git commit -m "chore: regenerate data.js [skip ci]" && git push
